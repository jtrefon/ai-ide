name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-15
    env:
      DERIVED_DATA_PATH: ./.build-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: "16.2"

      - name: Xcode Version
        run: xcodebuild -version

      - name: Resolve Package Dependencies
        run: >
          xcodebuild
          -resolvePackageDependencies
          -project osx-ide.xcodeproj
          -scheme osx-ide
          -derivedDataPath "$DERIVED_DATA_PATH"

      - name: Build
        run: >
          xcodebuild
          -project osx-ide.xcodeproj
          -scheme osx-ide
          -configuration Debug
          -derivedDataPath "$DERIVED_DATA_PATH"
          build
          CODE_SIGNING_ALLOWED=NO

  ui-unit:
    runs-on: macos-15
    needs: build
    env:
      DERIVED_DATA_PATH: ./.build-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: "16.2"

      - name: Resolve Package Dependencies
        run: >
          xcodebuild
          -resolvePackageDependencies
          -project osx-ide.xcodeproj
          -scheme osx-ide
          -derivedDataPath "$DERIVED_DATA_PATH"

      - name: Test (UI Unit + Integration)
        run: >
          xcodebuild
          -project osx-ide.xcodeproj
          -scheme osx-ide
          -configuration Debug
          -derivedDataPath "$DERIVED_DATA_PATH"
          test
          -destination 'platform=macOS'
          -only-testing:osx-ideTests
          -parallel-testing-enabled YES
          -maximum-parallel-testing-workers 4
          ENABLE_PREVIEWS=NO
          SWIFT_ENABLE_EXPLICIT_MODULES=NO
          CODE_SIGNING_ALLOWED=NO
          TEST_AFTER_BUILD=YES

  ui-smoke-uitest:
    runs-on: macos-15
    needs: ui-unit
    env:
      DERIVED_DATA_PATH: ./.build-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: "16.2"

      - name: Enforce no XCTSkip in core UI tests
        run: |
          if grep -R -n "XCTSkip(" osx-ideUITests; then
            echo "XCTSkip usage is not allowed in core UI tests"
            exit 1
          fi

      - name: Resolve Package Dependencies
        run: >
          xcodebuild
          -resolvePackageDependencies
          -project osx-ide.xcodeproj
          -scheme osx-ide
          -derivedDataPath "$DERIVED_DATA_PATH"

      - name: Test (UI Smoke)
        run: >
          xcodebuild
          -project osx-ide.xcodeproj
          -scheme osx-ide
          -configuration Debug
          -derivedDataPath "$DERIVED_DATA_PATH"
          test
          -destination 'platform=macOS'
          -only-testing:osx-ideUITests/OSXIDEUITests
          -only-testing:osx-ideUITests/TerminalEchoUITests
          -only-testing:osx-ideUITests/SettingsGeneralUITests
          -only-testing:osx-ideUITests/ChatPanelAlignmentUITests
          CODE_SIGNING_ALLOWED=NO

  ui-full-uitest:
    runs-on: macos-15
    needs: ui-smoke-uitest
    env:
      DERIVED_DATA_PATH: ./.build-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: "16.2"

      - name: Resolve Package Dependencies
        run: >
          xcodebuild
          -resolvePackageDependencies
          -project osx-ide.xcodeproj
          -scheme osx-ide
          -derivedDataPath "$DERIVED_DATA_PATH"

      - name: Test (Full UI Suite)
        run: >
          xcodebuild
          -project osx-ide.xcodeproj
          -scheme osx-ide
          -configuration Debug
          -derivedDataPath "$DERIVED_DATA_PATH"
          test
          -destination 'platform=macOS'
          -only-testing:osx-ideUITests
          CODE_SIGNING_ALLOWED=NO
