    <rect x="718" y="278" width="534" height="596" fill="#0B1012"/>
    <text x="752" y="326" fill="#71838B" font-size="15">1</text>
    <text x="792" y="326" fill="#D4F7E9" font-size="17">func routeAIRequest(_ task: Task) async throws {</text>
    <text x="752" y="366" fill="#71838B" font-size="15">2</text>
    <text x="820" y="366" fill="#8EE6D5" font-size="17">if task.latencyCritical {</text>
