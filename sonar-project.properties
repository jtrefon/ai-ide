# SonarCloud Configuration
# https://sonarsource.github.io/sonar-scanner-scanbot/

sonar.projectKey=ai-ide

# Source files to analyze - ONLY the main app
sonar.sources=osx-ide

# Exclude third-party code, tests, documentation, and build artifacts
# IMPORTANT: Vendor must be excluded - it's third-party ML library code
sonar.exclusions=
  Vendor/**,
  .build/**,
  .git/**,
  **/*.md,
  docs/**,
  Documentation/**,
  plans/**,
  LocalModelTemplates/**,
  Prompts/**,
  osx-ideTests/**,
  osx-ideUITests/**,
  osx-ideHarnessTests/**,
  **/DerivedData/**,
  **/.swiftpm/**

# Test files (can be included for coverage)
sonar.tests=osx-ideTests

# Swift specific
sonar.swift.appScheme=osx-ide

# Disable analysis of dependencies
sonar.java.binaries=build/classes
sonar.dependencyCheck.enabled=false
