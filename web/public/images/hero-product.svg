    <text x="752" y="412" fill="#71838B" font-size="15">3</text>
    <text x="848" y="412" fill="#F8F0E4" font-size="17">return try await localFIM.complete(task)</text>
    <text x="752" y="452" fill="#71838B" font-size="15">4</text>
    <text x="820" y="452" fill="#8EE6D5" font-size="17">}</text>
    <text x="752" y="492" fill="#71838B" font-size="15">5</text>
    <text x="820" y="492" fill="#D8B56D" font-size="17">let context = index.bestContextPack(for: task)</text>
    <text x="752" y="532" fill="#71838B" font-size="15">6</text>
    <text x="820" y="532" fill="#F8F0E4" font-size="17">return try await cloudAgent.execute(task, context)</text>
    <text x="752" y="572" fill="#71838B" font-size="15">7</text>
    <text x="792" y="572" fill="#D4F7E9" font-size="17">}</text>
