# Codacy Configuration
# https://docs.codacy.com/

engines:
  trivy:
    enabled: true

# Exclude third-party code and tests from analysis
exclude:
  - path: Vendor/**
    except: []
  - path: .build/**
    except: []
  - path: .git/**
    except: []
  - path: "**/*.md"
    except: []
  - path: docs/**
    except: []
  - path: Documentation/**
    except: []
  - path: plans/**
    except: []
  - path: LocalModelTemplates/**
    except: []
  - path: Prompts/**
    except: []
  - path: osx-ideTests/**
    except: []
  - path: osx-ideUITests/**
    except: []
  - path: osx-ideHarnessTests/**
    except: []
