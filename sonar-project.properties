# SonarCloud Configuration
# https://sonarsource.github.io/sonar-scanner-scanbot/

sonar.projectKey=ai-ide

# Source files to analyze
sonar.sources=osx-ide

# Exclude third-party code, tests, documentation, and build artifacts
sonar.exclusions=\
  Vendor/**,\
  .build/**,\
  **/*.md,\
  docs/**,\
  Documentation/**,\
  plans/**,\
  LocalModelTemplates/**,\
  Prompts/**,\
  osx-ideTests/**,\
  osx-ideUITests/**,\
  osx-ideHarnessTests/**

# Test files (can be included for coverage)
sonar.tests=osx-ideTests

# Swift specific
sonar.swift.appScheme=osx-ide
