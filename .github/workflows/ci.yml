name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DERIVED_DATA: .build-ci

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install libomp (OpenMP)
        run: brew install libomp

      - name: Build for Testing
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project osx-ide.xcodeproj \
            -scheme osx-ide \
            -derivedDataPath "$DERIVED_DATA"
          xcodebuild \
            -project osx-ide.xcodeproj \
            -scheme osx-ide \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA" \
            -destination 'platform=macOS' \
            build-for-testing \
            CODE_SIGNING_ALLOWED=NO

      - name: Copy Embedding Models
        run: |
          dest="$DERIVED_DATA/Build/Products/Debug/osx-ide.app/Contents/Resources/EmbeddingModels"
          mkdir -p "$dest"
          rsync -aq --delete osx-ide/Resources/EmbeddingModels/ "$dest/"

      - name: Upload Derived Data
        uses: actions/upload-artifact@v4
        with:
          name: derived-data
          path: ${{ env.DERIVED_DATA }}
          retention-days: 1

  unit-tests:
    needs: build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Download Derived Data
        uses: actions/download-artifact@v4
        with:
          name: derived-data
          path: ${{ env.DERIVED_DATA }}

      - name: Run Unit Tests
        run: |
          xcodebuild \
            -project osx-ide.xcodeproj \
            -scheme osx-ide \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA" \
            -destination 'platform=macOS' \
            -only-testing:osx-ideTests \
            test-without-building \
            CODE_SIGNING_ALLOWED=NO

  ui-tests:
    needs: build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Download Derived Data
        uses: actions/download-artifact@v4
        with:
          name: derived-data
          path: ${{ env.DERIVED_DATA }}

      - name: Run UI Tests
        run: |
          xcodebuild \
            -project osx-ide.xcodeproj \
            -scheme osx-ide \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA" \
            -destination 'platform=macOS' \
            -only-testing:osx-ideUITests \
            test-without-building \
            CODE_SIGNING_ALLOWED=NO

  publish-artifact:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [unit-tests, ui-tests]
    runs-on: macos-26
    steps:
      - name: Download Derived Data
        uses: actions/download-artifact@v4
        with:
          name: derived-data
          path: ${{ env.DERIVED_DATA }}

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: osx-ide-app
          path: ${{ env.DERIVED_DATA }}/Build/Products/Debug/osx-ide.app
          retention-days: 7
